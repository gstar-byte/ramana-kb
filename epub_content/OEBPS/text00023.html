<h1 class="kindle-cn-heading" id="calibre_pb_0"><a class="calibre10" id="page191"></a>
 第五部　亲验</h1>
<p class="kindle-cn-poem-left"><a class="calibre6" id="page192"></a>
 心灵修行的道上，经常会经验到一些副作用，<br class="calibre2" />
例如三摩地的妙乐、超自然的神通，或者身体的各种状态，<br class="calibre2" />
这些都是心智的产物，只会妨碍而不会有助于证悟真我，<br class="calibre2" />
所以重点应该放在经验者本身，而不该放纵这些经验或对它们进行深究。</p>
