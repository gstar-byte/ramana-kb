<h1 class="kindle-cn-heading" id="calibre_pb_0"><a class="calibre10" id="page227"></a>
 第六部　理论</h1>
<p class="kindle-cn-poem-left"><a class="calibre6" id="page228"></a>
 一切关于世界如何而有、宇宙之本质、物种进化、<br class="calibre2" />
神的旨意等等的争论，都是无用之举，<br class="calibre2" />
唯有尝试找到“我是谁”才能得到快乐。<br class="calibre2" />
只要解决了“我”是如何生起的问题，便解决了“创世”的谜题。</p>
