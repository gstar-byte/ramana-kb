<h1 class="kindle-cn-heading" id="calibre_pb_0"><a class="calibre10" id="page141"></a>
 第四部　冥想与瑜伽</h1>
<p class="kindle-cn-poem-left"><a class="calibre6" id="page142"></a>
 冥想、持咒、瑜伽、世间生活都是为了适应不同根器、<br class="calibre2" />
不同境地的人，而有不同修行的方式。<br class="calibre2" />
它们有一个共同的目的，<br class="calibre2" />
就是要打破众人长久以来所珍惜的妄见——以为他们和真我不同。</p>
