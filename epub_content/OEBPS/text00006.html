<h1 class="kindle-cn-heading" id="calibre_pb_0"><a class="calibre10" id="page1"></a>
 第一部　真我</h1>
<p class="kindle-cn-poem-left"><a class="calibre6" id="page2"></a>
 大千世界似乎稳定存在其内，大千世界为其所属，大千世界由其所出，<br class="calibre2" />
这一切均为其而存在，因为有它，才有大千世界，<br class="calibre2" />
这一切，的的确确都是它，唯独它，才是存在的“真实”。<br class="calibre2" />
我们该珍惜那个真我，它即是“真实”，就在本心之内。</p>
<p class="kindle-cn-para-right">
<span>——《玛哈瑜伽》</span>
</p>
