<h1 class="kindle-cn-heading" id="calibre_pb_0"><a class="calibre10" id="page51"></a>
 第二部　参究与归伏</h1>
<p class="kindle-cn-poem-left"><a class="calibre6" id="page52"></a>
 拉玛那常把“归伏”和“参究”的修法画上等号，<br class="calibre2" />
说它们是同一种修行过程。<br class="calibre2" />
依“奉爱”方法的人称之为“归伏”，依“参究”方法的人称之为“智”，<br class="calibre2" />
两者的目标都是要孤立“我念”，让它消逝于其源头中。</p>
