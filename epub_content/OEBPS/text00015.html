<h1 class="kindle-cn-heading" id="calibre_pb_0"><a class="calibre10" id="page113"></a>
 第三部　上师</h1>
<p class="kindle-cn-poem-left"><a class="calibre6" id="page114"></a>
 上师是神化成人的形态，同时也是每位弟子本心内的真我。<br class="calibre2" />
他既在“内”又在“外”。<br class="calibre2" />
外在的上师能够施教，让弟子的注意力集中于真我上；<br class="calibre2" />
内在的上师能将弟子的心智拉回它的源头，让它融入真我。</p>
