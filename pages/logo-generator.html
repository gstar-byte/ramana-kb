<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双手合十Logo生成器</title>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #c77dff;
            font-size: 24px;
        }
        .logo-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .logo-item {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .logo-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(199, 125, 255, 0.3);
        }
        .logo-item svg {
            width: 120px;
            height: 120px;
            margin-bottom: 10px;
        }
        .logo-item p {
            margin: 0;
            font-size: 14px;
            color: #e0e0e0;
        }
        .download-section {
            text-align: center;
            margin-top: 30px;
        }
        button {
            background: linear-gradient(135deg, #c77dff, #9d4edd);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(199, 125, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>双手合十 Logo & Icon 生成器</h1>
        
        <div class="logo-container">
            <!-- 简约风格 -->
            <div class="logo-item">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M30 30C25 35 25 45 25 50C25 55 25 65 30 70C35 75 45 75 50 70C55 75 65 75 70 70C75 65 75 55 75 50C75 45 75 35 70 30C65 25 55 25 50 30C45 25 35 25 30 30Z" fill="#c77dff" opacity="0.8"/>
                    <path d="M35 35C32 38 32 43 32 47C32 51 32 56 35 59C38 62 43 62 47 59C43 62 38 62 35 59C32 56 32 51 32 47C32 43 32 38 35 35Z" fill="#ffffff" opacity="0.9"/>
                    <path d="M65 35C68 38 68 43 68 47C68 51 68 56 65 59C62 62 57 62 53 59C57 62 62 62 65 59C68 56 68 51 68 47C68 43 68 38 65 35Z" fill="#ffffff" opacity="0.9"/>
                </svg>
                <p>简约风格</p>
            </div>
            
            <!-- 渐变风格 -->
            <div class="logo-item">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#c77dff"/>
                            <stop offset="100%" stop-color="#4ecdc4"/>
                        </linearGradient>
                    </defs>
                    <path d="M30 30C25 35 25 45 25 50C25 55 25 65 30 70C35 75 45 75 50 70C55 75 65 75 70 70C75 65 75 55 75 50C75 45 75 35 70 30C65 25 55 25 50 30C45 25 35 25 30 30Z" fill="url(#gradient)"/>
                    <path d="M35 35C32 38 32 43 32 47C32 51 32 56 35 59C38 62 43 62 47 59C43 62 38 62 35 59C32 56 32 51 32 47C32 43 32 38 35 35Z" fill="#ffffff" opacity="0.9"/>
                    <path d="M65 35C68 38 68 43 68 47C68 51 68 56 65 59C62 62 57 62 53 59C57 62 62 62 65 59C68 56 68 51 68 47C68 43 68 38 65 35Z" fill="#ffffff" opacity="0.9"/>
                </svg>
                <p>渐变风格</p>
            </div>
            
            <!-- 轮廓风格 -->
            <div class="logo-item">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M30 30C25 35 25 45 25 50C25 55 25 65 30 70C35 75 45 75 50 70C55 75 65 75 70 70C75 65 75 55 75 50C75 45 75 35 70 30C65 25 55 25 50 30C45 25 35 25 30 30Z" fill="none" stroke="#c77dff" stroke-width="3"/>
                    <path d="M35 35C32 38 32 43 32 47C32 51 32 56 35 59C38 62 43 62 47 59C43 62 38 62 35 59C32 56 32 51 32 47C32 43 32 38 35 35Z" fill="none" stroke="#ffffff" stroke-width="2"/>
                    <path d="M65 35C68 38 68 43 68 47C68 51 68 56 65 59C62 62 57 62 53 59C57 62 62 62 65 59C68 56 68 51 68 47C68 43 68 38 65 35Z" fill="none" stroke="#ffffff" stroke-width="2"/>
                </svg>
                <p>轮廓风格</p>
            </div>
            
            <!-- 立体风格 -->
            <div class="logo-item">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M30 30C25 35 25 45 25 50C25 55 25 65 30 70C35 75 45 75 50 70C55 75 65 75 70 70C75 65 75 55 75 50C75 45 75 35 70 30C65 25 55 25 50 30C45 25 35 25 30 30Z" fill="#c77dff"/>
                    <path d="M30 30C25 35 25 45 25 50C25 55 25 65 30 70" fill="none" stroke="#9d4edd" stroke-width="2"/>
                    <path d="M70 30C75 35 75 45 75 50C75 55 75 65 70 70" fill="none" stroke="#9d4edd" stroke-width="2"/>
                    <path d="M35 35C32 38 32 43 32 47C32 51 32 56 35 59C38 62 43 62 47 59" fill="#ffffff"/>
                    <path d="M65 35C68 38 68 43 68 47C68 51 68 56 65 59C62 62 57 62 53 59" fill="#ffffff"/>
                </svg>
                <p>立体风格</p>
            </div>
        </div>
        
        <div class="download-section">
            <button onclick="downloadSVG('simple', 1)">下载简约风格 SVG</button>
            <button onclick="downloadSVG('gradient', 2)">下载渐变风格 SVG</button>
            <button onclick="downloadSVG('outline', 3)">下载轮廓风格 SVG</button>
            <button onclick="downloadSVG('3d', 4)">下载立体风格 SVG</button>
        </div>
    </div>
    
    <script>
        function downloadSVG(style, index) {
            const svgElement = document.querySelectorAll('.logo-item svg')[index - 1];
            const svgData = new XMLSerializer().serializeToString(svgElement);
            const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
            const svgUrl = URL.createObjectURL(svgBlob);
            
            const downloadLink = document.createElement('a');
            downloadLink.href = svgUrl;
            downloadLink.download = `praying-hands-${style}.svg`;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
</html>
